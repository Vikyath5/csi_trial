name: neurovision_platform
description: "NeuroVision - Assistive Learning Platform for ADHD, Dyslexia & Visually Impaired users."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # --- Core ---
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1

  # --- Vision Module: ML Kit & Camera ---
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_image_labeling: ^0.14.2
  camera: ^0.11.4

  # --- Vision Module: Haptic & Audio Feedback ---
  vibration: ^3.1.8
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0

  # --- Accessibility ---
  google_fonts: ^8.0.2
  flutter_vision: ^2.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Pin device_info_plus to stable 11.x — version 12.x breaks GeneratedPluginRegistrant
dependency_overrides:
  device_info_plus: ^11.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/labels/
    - assets/models/
